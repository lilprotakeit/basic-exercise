name: Deployment Workflow
on: push
jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Get latest code
              uses: actions/checkout@v3
            - name: install dependencies
              run: npm ci
            - name: Lint
              run: npm run lint
            - name: Test code
              run: npm run test
            - name: Build
              run: npm run build 
            - name: Deploy
              run: echo "Deploying to production server..."