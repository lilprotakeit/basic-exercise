name: Deployment Workflow 2
on: push
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v3
      - name: install dependencies
        run: npm ci
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v3
      - name: install dependencies
        run: npm ci
      - name: Test
        run: npm run test
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v3
      - name: install dependencies
        run: npm ci
      - name: Build
        run: npm run build 
      - name: Deploy
        run: echo "Deploying to production server..."